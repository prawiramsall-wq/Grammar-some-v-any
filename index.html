<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Some or Any Quiz</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#0a66c2;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

.quiz-card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.question{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

.option{
display:block;
padding:10px;
margin-bottom:8px;
border:1px solid #ddd;
border-radius:10px;
cursor:pointer;
}

.option:hover{
background:#eef5ff;
}

.answer{
display:none;
margin-top:10px;
font-weight:bold;
}

.correct{
color:green;
}

.wrong{
color:red;
}

button{
display:block;
margin:30px auto;
padding:15px 35px;
border:none;
border-radius:10px;
background:#0a66c2;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#084d93;
}

.result{
display:none;
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.08);
margin-top:20px;
}

.score{
font-size:50px;
font-weight:bold;
color:#0a66c2;
}
</style>
</head>
<body>

<div class="container">

<h1>Some or Any Quiz</h1>
<p class="subtitle">Choose the correct answer.</p>

<form id="quizForm"></form>

<button onclick="checkAnswers()" type="button">
Submit Answers
</button>

<div class="result" id="resultBox">
<h2>Your Score</h2>
<div class="score" id="score"></div>
<p id="message"></p>
</div>

</div>

<script>

const questions = [

{
question:"Can I have ____ water, please?",
options:["some","any"],
answer:"some"
},

{
question:"Do you have ____ brothers?",
options:["some","any"],
answer:"any"
},

{
question:"There are ____ apples on the table.",
options:["some","any"],
answer:"some"
},

{
question:"I don't have ____ money.",
options:["some","any"],
answer:"any"
},

{
question:"Would you like ____ coffee?",
options:["some","any"],
answer:"some"
},

{
question:"Is there ____ milk in the fridge?",
options:["some","any"],
answer:"any"
},

{
question:"She bought ____ new clothes.",
options:["some","any"],
answer:"some"
},

{
question:"We didn't see ____ animals.",
options:["some","any"],
answer:"any"
},

{
question:"Could I borrow ____ pens?",
options:["some","any"],
answer:"some"
},

{
question:"Are there ____ questions?",
options:["some","any"],
answer:"any"
},

{
question:"I need ____ help.",
options:["some","any"],
answer:"some"
},

{
question:"They don't have ____ children.",
options:["some","any"],
answer:"any"
},

{
question:"There is ____ cheese in the kitchen.",
options:["some","any"],
answer:"some"
},

{
question:"Have you got ____ homework today?",
options:["some","any"],
answer:"any"
},

{
question:"She wants ____ information.",
options:["some","any"],
answer:"some"
},

{
question:"We haven't received ____ emails.",
options:["some","any"],
answer:"any"
},

{
question:"Can you give me ____ advice?",
options:["some","any"],
answer:"some"
},

{
question:"Did you buy ____ bread?",
options:["some","any"],
answer:"any"
},

{
question:"I have ____ good friends.",
options:["some","any"],
answer:"some"
},

{
question:"There isn't ____ sugar left.",
options:["some","any"],
answer:"any"
}

];

const form = document.getElementById("quizForm");

questions.forEach((q,index)=>{

let optionsHTML = "";

q.options.forEach(option=>{

optionsHTML += `
<label class="option">
<input type="radio" name="q${index}" value="${option}">
${option}
</label>
`;

});

form.innerHTML += `

<div class="quiz-card">

<div class="question">
${index+1}. ${q.question}
</div>

${optionsHTML}

<div class="answer" id="answer${index}">
</div>

</div>

`;

});

function checkAnswers(){

let score = 0;

questions.forEach((q,index)=>{

const selected =
document.querySelector(`input[name="q${index}"]:checked`);

const answerBox =
document.getElementById(`answer${index}`);

if(selected && selected.value === q.answer){

score++;

answerBox.innerHTML =
`✓ Correct`;

answerBox.className =
"answer correct";

}else{

answerBox.innerHTML =
`✗ Correct answer: ${q.answer}`;

answerBox.className =
"answer wrong";

}

answerBox.style.display = "block";

});

const percent =
Math.round(score/questions.length*100);

document.getElementById("score").innerHTML =
`${score} / ${questions.length}`;

let message = "";

if(percent >= 90){
message = "🏆 Excellent!";
}
else if(percent >= 70){
message = "🎓 Good Job!";
}
else if(percent >= 50){
message = "📘 Keep Practicing!";
}
else{
message = "📚 Study Some & Any Again!";
}

document.getElementById("message").innerHTML =
`${percent}% - ${message}`;

document.getElementById("resultBox").style.display =
"block";

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
